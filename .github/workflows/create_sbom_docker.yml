name: Create SBOM
run-name: create-sbom

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    name: Generate SBOM with Syft
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c816612b # v6
        with:
          context: .
          file: ./docker/Dockerfile
          load: true
          tags: azure-kinect-rtsp-streamer:latest

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0
        with:
          image: azure-kinect-rtsp-streamer:latest
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom.json
